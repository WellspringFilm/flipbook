<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wellspring Magazine</title>
<style>
/* Prevent any scrolling INSIDE the iframe document */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden !important; /* ⛔ no inner scrollbars */
  overscroll-behavior: none;
}
/* FIXED: Changed from fixed to relative positioning to live nicely inside Webflow layout boxes */
#stage {
  position: relative; 
  width: 100%;
  height: 100vh; /* Locks container safely to screen height bounds */
  overflow: hidden !important; /* Hard-clips any ghost canvas padding from turn.js */
  display: flex;
  justify-content: center; /* center horizontally */
  align-items: center; /* FIXED: Centered vertically so it scales perfectly on all axes */
  background: transparent;
}
* {
  box-sizing: border-box;
}
#magazine {
  background: transparent;
  touch-action: manipulation;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#magazine div {
  width: 100%;
  height: 100%;
  background-size: cover; /* keeps flip alignment */
  background-position: center;
  background-repeat: no-repeat;
}
</style>
</head>
<body>
<div id="stage">
  <div id="magazine">
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
    <div style="background-image: url('https://website-files.com');"></div>
  </div>
</div>

<script src="jquery-3.7.1.min.js"></script>
<script src="turn.js"></script>
<script>
$(function () {
  const magazine = $('#magazine');
  
  /* FIXED: Set both initial check and resize check to use 768px for standard tablet/mobile consistency */
  let lastMode = window.innerWidth >= 768 ? 'desktop' : 'mobile';

  function setupFlipbook(mode) {
    if (magazine.data('turn')) {
      magazine.turn('destroy').removeClass('turnjs');
    }

    if (mode === 'mobile') {
      magazine.css({ width: '300px', height: '450px' });
      magazine.turn({
        width: 300,
        height: 450,
        display: 'single',
        autoCenter: true,
        acceleration: true,
        gradients: true,
        elevation: 50
      });
    } else {
      const aspect = 4 / 3;
      let ww = Math.min(window.innerWidth * 0.95, 1400);
      let wh = window.innerHeight * 0.85;
      let w = ww;
      let h = w / aspect;

      if (h > wh) {
        h = wh;
        w = h * aspect;
      }

      magazine.css({ width: w + 'px', height: h + 'px' });
      magazine.turn({
        width: w,
        height: h,
        display: 'double',
        autoCenter: true,
        acceleration: true,
        gradients: true,
        elevation: 50
      });
    }
  }

  setupFlipbook(lastMode);

  $(window).on('keydown', function (e) {
    if (e.keyCode === 37) magazine.turn('previous');
    else if (e.keyCode === 39) magazine.turn('next');
  });

  /* FIXED: Matches the 768px mode threshold cleanly to avoid script calculation layout crashes */
  $(window).on('resize', function () {
    const currentMode = window.innerWidth >= 768 ? 'desktop' : 'mobile';
    if (currentMode !== lastMode) {
      location.reload();
    }
  });

  magazine.on('click', function (e) {
    const x = e.pageX - magazine.offset().left;
    const midpoint = magazine.width() / 2;
    if (x < midpoint) magazine.turn('previous');
    else magazine.turn('next');
  });
});
</script>
</body>
</html>
